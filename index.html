<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIB · PMO Weekly Report</title>
<style>
  html,body{margin:0;height:100%;background:#FAF9F5;overflow:hidden}
  #rpt{position:fixed;inset:0;border:0;width:100%;height:100%;display:block}
  /* brief loading hint until the report frame paints */
  #load{position:fixed;inset:0;display:grid;place-items:center;background:#FAF9F5;
    font-family:system-ui,Segoe UI,sans-serif;color:#8a8676;z-index:2;transition:opacity .4s}
  #load.gone{opacity:0;pointer-events:none}
  .dot{width:10px;height:10px;border-radius:50%;background:#4F9D8B;display:inline-block;
    margin:0 3px;animation:b 1s infinite ease-in-out}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
  <!-- fibpmo.com opens the weekly report directly (no access-code page) -->
  <iframe id="rpt"
          src="https://rudawathegw-design.github.io/jira-weekly-progress/"
          title="FIB PMO Weekly Report"
          allow="clipboard-read; clipboard-write"
          onload="document.getElementById('load').classList.add('gone')"></iframe>

  <div id="load"><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>

<script>
  // ── Hidden keyboard access (no visible code box) ──────────────────────
  //   type  pmo  → PMO dashboard (asks the second security password)
  //   type  fib  → reload the weekly report
  // Note: works while this page has focus. After clicking inside the report,
  // press Esc once (returns focus here) then type the word.
  (function () {
    var buf = "";
    function onKey(e) {
      if (!e.key || e.key.length !== 1) return;
      buf = (buf + e.key.toLowerCase()).slice(-6);
      if (buf.indexOf("pmo") > -1) { window.location.href = "dashboard/"; }
      else if (buf.indexOf("fib") > -1) { buf = ""; var f = document.getElementById("rpt"); f.src = f.src; }
    }
    window.addEventListener("keydown", onKey);
    // pressing Esc pulls focus back to this page so the shortcut keeps working
    window.addEventListener("keydown", function (e) { if (e.key === "Escape") window.focus(); });
  })();
</script>
</body>
</html>
