<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIB · PMO Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --terra:#D97757; --terra2:#C15F3C; --gold:#E9A23B; --green:#5BA97B;
    --ink:#3D3929; --mut:#87867F; --line:#E8E6DD;
  }
  body{
    font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;
    background:radial-gradient(1000px 600px at 80% -10%,#F7E7DA 0%,transparent 55%),
               radial-gradient(800px 500px at -10% 110%,#EFE9DC 0%,transparent 55%),
               linear-gradient(160deg,#FAF9F5,#F0EEE6);
    color:var(--ink);padding:20px;overflow:hidden;
  }
  /* soft ambient shapes */
  .orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.45;pointer-events:none;animation:float 10s ease-in-out infinite}
  .orb1{width:320px;height:320px;background:#F4D9C8;top:-90px;left:-90px}
  .orb2{width:280px;height:280px;background:#F0E6CD;bottom:-80px;right:-60px;animation-delay:-4s}
  @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-26px) scale(1.05)}}

  .card{
    position:relative;background:#fff;border:1px solid var(--line);border-radius:24px;
    box-shadow:0 28px 70px -28px rgba(61,57,41,.35),0 4px 16px rgba(61,57,41,.06);
    padding:46px 52px;width:min(420px,92vw);text-align:center;
    animation:cardIn .8s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(34px) scale(.94)}to{opacity:1;transform:none}}

  .logo{
    width:64px;height:64px;margin:0 auto 18px;display:grid;place-items:center;color:#fff;font-size:28px;
    background:linear-gradient(135deg,#E8936F,#D97757 50%,#C15F3C);
    box-shadow:0 12px 30px -10px rgba(217,119,87,.55);
    border-radius:42% 58% 55% 45%/48% 42% 58% 52%;
    animation:logoPop .9s .15s cubic-bezier(.34,1.56,.64,1) both,logoMorph 6s 1.2s ease-in-out infinite;
  }
  @keyframes logoPop{from{opacity:0;transform:scale(.4) rotate(-12deg)}to{opacity:1;transform:none}}
  @keyframes logoMorph{0%,100%{border-radius:42% 58% 55% 45%/48% 42% 58% 52%}
    33%{border-radius:58% 42% 45% 55%/52% 58% 42% 48%}66%{border-radius:50% 50% 62% 38%/45% 55% 50% 50%}}
  h2{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;
     animation:fadeUp .7s .25s both}
  h2 .grad{background:linear-gradient(90deg,var(--terra),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  p.sub{color:var(--mut);font-size:13.5px;margin-bottom:26px;animation:fadeUp .7s .35s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  form{animation:fadeUp .7s .45s both}
  .inp{
    width:100%;border:1.5px solid #E0DCD1;border-radius:12px;background:#FAF9F5;
    color:var(--ink);font-size:16px;padding:13px 16px;font-family:inherit;text-align:center;letter-spacing:.12em;
    transition:border-color .25s,background .25s,box-shadow .25s;outline:none;
  }
  .inp::placeholder{letter-spacing:normal;color:#B0AB9D}
  .inp:hover{border-color:#E5B39E}
  .inp:focus{border-color:var(--terra);background:#fff;box-shadow:0 0 0 4px rgba(217,119,87,.16)}

  .btn-primary{
    position:relative;width:100%;margin-top:14px;overflow:hidden;
    background:linear-gradient(135deg,var(--terra),var(--terra2));
    color:#fff;font-weight:700;font-size:15px;border:none;border-radius:12px;padding:14px;cursor:pointer;
    letter-spacing:.03em;font-family:'Sora',sans-serif;
    transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,filter .2s;
    box-shadow:0 10px 26px -10px rgba(193,95,60,.55);
  }
  .btn-primary:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 16px 34px -12px rgba(193,95,60,.6);filter:brightness(1.06)}
  .btn-primary:active{transform:translateY(0) scale(.98)}
  .btn-primary::after{
    content:"";position:absolute;top:0;left:-80%;width:50%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);
    transform:skewX(-20deg);transition:left .6s ease;
  }
  .btn-primary:hover::after{left:130%}

  .err-msg{color:#C0392B;font-size:13px;margin-top:14px;min-height:18px;visibility:hidden;font-weight:500}
  .err-msg.show{visibility:visible;animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .card.wrong{animation:shake .4s}

  .foot{color:#A8A395;font-size:11px;margin-top:24px;letter-spacing:.04em;animation:fadeUp .7s .55s both}

  /* ── opening transition after a correct code ── */
  .splash{position:fixed;inset:0;z-index:50;display:none;overflow:hidden}
  .splash.on{display:block}
  .sp-panel{position:absolute;left:0;right:0;height:50.2%}
  .sp-top{top:0;background:linear-gradient(180deg,#FAF9F5,#F5F1E8);transform:translateX(-100%);
    animation:spInL .5s cubic-bezier(.22,1,.36,1) forwards}
  .sp-bot{bottom:0;background:linear-gradient(0deg,#F0EEE6,#F5F1E8);transform:translateX(100%);
    animation:spInR .5s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes spInL{to{transform:translateX(0)}}
  @keyframes spInR{to{transform:translateX(0)}}
  .sp-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:20px}
  .sp-blob{width:84px;height:84px;margin:0 auto 20px;display:grid;place-items:center;color:#fff;font-size:36px;
    background:linear-gradient(135deg,#E8936F,#D97757 50%,#C15F3C);box-shadow:0 16px 38px -12px rgba(217,119,87,.55);
    border-radius:42% 58% 55% 45%/48% 42% 58% 52%;
    transform:scale(0);animation:spPop .65s .4s cubic-bezier(.34,1.56,.64,1) forwards,logoMorph 4.5s .9s ease-in-out infinite}
  @keyframes spPop{to{transform:scale(1)}}
  .sp-title{font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(26px,5vw,46px);color:var(--ink);letter-spacing:-.02em;line-height:1.12}
  .sp-title span{display:inline-block;opacity:0}
  .sp-title span:first-child{animation:spL .65s .6s cubic-bezier(.22,1,.36,1) forwards}
  .sp-title span:last-child{animation:spR .65s .72s cubic-bezier(.22,1,.36,1) forwards;
    background:linear-gradient(90deg,#D97757,#C15F3C,#E9A23B);-webkit-background-clip:text;background-clip:text;color:transparent}
  @keyframes spL{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:none}}
  @keyframes spR{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:none}}
  .sp-bar{width:min(240px,64vw);height:4px;border-radius:99px;background:#EAE6DA;margin:24px auto 0;overflow:hidden;opacity:0;
    animation:spFadeUp .5s 1s both}
  .sp-bar i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,#D97757,#E9A23B);
    animation:spLoad 1.3s 1.05s ease-in-out forwards}
  @keyframes spLoad{to{width:100%}}
  .sp-sub{color:var(--mut);font-size:12px;letter-spacing:.26em;text-transform:uppercase;margin-top:14px;opacity:0;
    animation:spFadeUp .6s .95s both}
  @keyframes spFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
  <div class="orb orb1"></div><div class="orb orb2"></div>

  <div class="card" id="card">
    <div class="logo">📊</div>
    <h2><span class="grad">PMO</span> Portal</h2>
    <p class="sub">Enter your access code to continue</p>

    <form id="gate" autocomplete="off">
      <input id="code" class="inp" type="password" placeholder="Access code" aria-label="Access code" autofocus>
      <button type="submit" class="btn-primary">Enter →</button>
      <div class="err-msg" id="err">Invalid code — please try again.</div>
    </form>

    <div class="foot">FIRST IRAQ BANK · PROJECT MANAGEMENT OFFICE</div>
  </div>

  <!-- opening transition shown after a correct code -->
  <div class="splash" id="splash" aria-hidden="true">
    <div class="sp-panel sp-top"></div>
    <div class="sp-panel sp-bot"></div>
    <div class="sp-center">
      <div>
        <div class="sp-blob">✓</div>
        <h1 class="sp-title"><span>FIB&nbsp;PMO</span> <span>Team&nbsp;Reporting</span></h1>
        <div class="sp-bar"><i></i></div>
        <div class="sp-sub">Fast · Awesome · Attractive</div>
      </div>
    </div>
  </div>

<script>
  // ── Routing map ─────────────────────────────────────────────────────
  //  code (lowercase)  →  destination
  var ROUTES = {
    "fib": "report/",   // weekly progress report
    "pmo": "dashboard/" // PMO dashboard
  };

  var form = document.getElementById("gate");
  var err  = document.getElementById("err");
  var card = document.getElementById("card");
  var splash = document.getElementById("splash");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var code = document.getElementById("code").value.trim().toLowerCase();
    if (ROUTES[code]) {
      var dest = ROUTES[code];
      splash.classList.add("on");
      splash.setAttribute("aria-hidden", "false");
      // let the opening play, then go
      setTimeout(function () { window.location.href = dest; }, 2600);
    } else {
      err.classList.add("show");
      card.classList.add("wrong");
      setTimeout(function(){ card.classList.remove("wrong"); }, 450);
    }
  });
  document.getElementById("code").addEventListener("input", function () {
    err.classList.remove("show");
  });
</script>
</body>
</html>
