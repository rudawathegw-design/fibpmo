<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIB · PMO Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg1:#0b1020; --bg2:#101935;
    --teal:#2dd4bf; --gold:#f5b942; --violet:#8b7cf6;
    --ink:#eaf0ff; --mut:#8b96b8;
  }
  body{
    font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;
    background:radial-gradient(1200px 700px at 80% -10%,#1b2a5e 0%,transparent 55%),
               radial-gradient(900px 600px at -10% 110%,#0e3b38 0%,transparent 55%),
               linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--ink);padding:20px;overflow:hidden;
  }
  /* floating ambient orbs */
  .orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.35;pointer-events:none;animation:float 9s ease-in-out infinite}
  .orb1{width:340px;height:340px;background:#2dd4bf;top:-90px;left:-90px}
  .orb2{width:300px;height:300px;background:#8b7cf6;bottom:-80px;right:-60px;animation-delay:-3s}
  .orb3{width:200px;height:200px;background:#f5b942;top:55%;left:8%;opacity:.18;animation-delay:-6s}
  @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.06)}}

  .card{
    position:relative;background:rgba(17,24,48,.72);backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.10);border-radius:24px;
    box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08);
    padding:46px 52px;width:min(420px,92vw);text-align:center;
    animation:cardIn .8s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(34px) scale(.94)}to{opacity:1;transform:none}}
  .card::before{
    content:"";position:absolute;inset:-1px;border-radius:24px;padding:1px;pointer-events:none;
    background:linear-gradient(135deg,rgba(45,212,191,.6),transparent 30%,transparent 70%,rgba(139,124,246,.6));
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
  }

  .logo{
    width:64px;height:64px;margin:0 auto 18px;border-radius:18px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--teal),#0ea5a0);font-size:30px;
    box-shadow:0 10px 30px rgba(45,212,191,.35);
    animation:logoPop .9s .15s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes logoPop{from{opacity:0;transform:scale(.4) rotate(-12deg)}to{opacity:1;transform:none}}
  h2{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;
     animation:fadeUp .7s .25s both}
  h2 .grad{background:linear-gradient(90deg,var(--teal),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
  p.sub{color:var(--mut);font-size:13.5px;margin-bottom:26px;animation:fadeUp .7s .35s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  form{animation:fadeUp .7s .45s both}
  .inp{
    width:100%;border:1.5px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(255,255,255,.06);
    color:var(--ink);font-size:16px;padding:13px 16px;font-family:inherit;text-align:center;letter-spacing:.12em;
    transition:border-color .25s,background .25s,box-shadow .25s,transform .15s;outline:none;
  }
  .inp::placeholder{letter-spacing:normal;color:#5d688c}
  .inp:hover{border-color:rgba(45,212,191,.45);background:rgba(255,255,255,.09)}
  .inp:focus{border-color:var(--teal);background:rgba(45,212,191,.08);box-shadow:0 0 0 4px rgba(45,212,191,.18)}

  .btn-primary{
    position:relative;width:100%;margin-top:14px;overflow:hidden;
    background:linear-gradient(135deg,var(--teal) 0%,#14b8a6 50%,var(--violet) 130%);
    color:#06241f;font-weight:700;font-size:15px;border:none;border-radius:12px;padding:14px;cursor:pointer;
    letter-spacing:.03em;font-family:'Sora',sans-serif;
    transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,filter .2s;
    box-shadow:0 8px 24px rgba(45,212,191,.30);
  }
  .btn-primary:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 14px 34px rgba(45,212,191,.45);filter:brightness(1.08)}
  .btn-primary:active{transform:translateY(0) scale(.98)}
  .btn-primary::after{ /* shine sweep on hover */
    content:"";position:absolute;top:0;left:-80%;width:50%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);
    transform:skewX(-20deg);transition:left .6s ease;
  }
  .btn-primary:hover::after{left:130%}

  .err-msg{color:#fb7185;font-size:13px;margin-top:14px;min-height:18px;visibility:hidden;font-weight:500}
  .err-msg.show{visibility:visible;animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .card.wrong{animation:shake .4s}

  .foot{color:#566089;font-size:11px;margin-top:24px;letter-spacing:.04em;animation:fadeUp .7s .55s both}

  /* ── Success splash ─────────────────────────────────────── */
  .splash{
    position:fixed;inset:0;z-index:50;display:grid;place-items:center;text-align:center;
    background:radial-gradient(900px 600px at 50% 40%,#123c38 0%,#0b1020 70%);
    opacity:0;pointer-events:none;transition:opacity .5s ease;
  }
  .splash.on{opacity:1;pointer-events:auto}
  .splash .ring{
    position:absolute;width:120px;height:120px;border-radius:50%;
    border:2px solid rgba(45,212,191,.5);opacity:0;
  }
  .splash.on .ring{animation:ripple 1.6s ease-out infinite}
  .splash.on .ring:nth-child(2){animation-delay:.4s}
  .splash.on .ring:nth-child(3){animation-delay:.8s}
  @keyframes ripple{from{transform:scale(.6);opacity:.8}to{transform:scale(6);opacity:0}}
  .splash-inner{position:relative;z-index:2}
  .splash .check{
    width:88px;height:88px;margin:0 auto 26px;border-radius:50%;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--teal),#0d9488);font-size:42px;color:#06241f;
    box-shadow:0 0 0 10px rgba(45,212,191,.12),0 20px 50px rgba(45,212,191,.4);
    transform:scale(0);
  }
  .splash.on .check{animation:pop .7s .1s cubic-bezier(.34,1.56,.64,1) forwards}
  @keyframes pop{to{transform:scale(1)}}
  .splash h1{
    font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(26px,5vw,44px);letter-spacing:-.02em;
    background:linear-gradient(90deg,var(--teal),#7dd3fc,var(--violet),var(--gold));
    background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;
  }
  .splash.on h1{animation:fadeUp .8s .5s both,sheen 3s 1s linear infinite}
  @keyframes sheen{to{background-position:300% 0}}
  .splash p{color:var(--mut);font-size:15px;margin-top:12px;opacity:0}
  .splash.on p{animation:fadeUp .8s .9s both}
  .splash .bar{
    width:min(260px,70vw);height:4px;border-radius:99px;background:rgba(255,255,255,.10);
    margin:30px auto 0;overflow:hidden;opacity:0;
  }
  .splash.on .bar{animation:fadeUp .6s 1.1s both}
  .splash .bar i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--teal),var(--violet))}
  .splash.on .bar i{animation:load 1.5s 1.2s ease-in-out forwards}
  @keyframes load{to{width:100%}}
</style>
</head>
<body>
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>

  <div class="card" id="card">
    <div class="logo">📊</div>
    <h2><span class="grad">PMO</span> Portal</h2>
    <p class="sub">Enter your access code to continue</p>

    <form id="gate" autocomplete="off">
      <input id="code" class="inp" type="password" placeholder="Access code" aria-label="Access code" autofocus>
      <button type="submit" class="btn-primary">Enter →</button>
      <div class="err-msg" id="err">Invalid code — please try again.</div>
    </form>

    <div class="foot">FIRST IRAQ BANK · PROJECT MANAGEMENT OFFICE</div>
  </div>

  <!-- success splash shown after a correct code -->
  <div class="splash" id="splash" aria-hidden="true">
    <span class="ring"></span><span class="ring"></span><span class="ring"></span>
    <div class="splash-inner">
      <div class="check">✓</div>
      <h1>FIB PMO Team Reporting</h1>
      <p>Fast · Awesome · Attractive</p>
      <div class="bar"><i></i></div>
    </div>
  </div>

<script>
  // ── Routing map ─────────────────────────────────────────────────────
  //  code (lowercase)  →  destination
  var ROUTES = {
    "fib": "report/",   // weekly progress report
    "pmo": "dashboard/" // PMO dashboard
  };

  var form = document.getElementById("gate");
  var err  = document.getElementById("err");
  var card = document.getElementById("card");
  var splash = document.getElementById("splash");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var code = document.getElementById("code").value.trim().toLowerCase();
    if (ROUTES[code]) {
      var dest = ROUTES[code];
      splash.classList.add("on");
      splash.setAttribute("aria-hidden", "false");
      // give the splash animation time to play, then open the destination
      setTimeout(function () { window.location.href = dest; }, 3000);
    } else {
      err.classList.add("show");
      card.classList.add("wrong");
      setTimeout(function(){ card.classList.remove("wrong"); }, 450);
    }
  });
  document.getElementById("code").addEventListener("input", function () {
    err.classList.remove("show");
  });
</script>
</body>
</html>
