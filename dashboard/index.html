<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIB · PMO Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --fib:#0a3b7c; --fib2:#1366cc; --accent:#f5a623;
    --green:#16a34a; --amber:#f59e0b; --red:#dc2626;
    --bg:#f4f6fb; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e6eaf2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 22px 60px}

  /* Header */
  header{background:linear-gradient(120deg,var(--fib),var(--fib2));color:#fff;border-radius:18px;padding:30px 34px;
    box-shadow:0 14px 34px -14px rgba(10,59,124,.6);position:relative;overflow:hidden}
  header::after{content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;
    background:rgba(255,255,255,.07)}
  .brandrow{display:flex;align-items:center;gap:14px}
  .logo{width:50px;height:50px;border-radius:13px;background:#fff;color:var(--fib);display:grid;place-items:center;
    font-weight:800;font-size:20px;letter-spacing:.5px;box-shadow:0 6px 16px rgba(0,0,0,.18)}
  header h1{font-size:24px;font-weight:700}
  header p{opacity:.9;font-size:14px;margin-top:3px}
  .topright{position:absolute;right:30px;top:26px;display:flex;gap:8px;align-items:center}
  .backlink{font-size:12px;color:#fff;opacity:.85;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:5px 11px}
  .backlink:hover{opacity:1;background:rgba(255,255,255,.1)}

  /* Section */
  .sec{margin-top:32px}
  .sec h2{font-size:15px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:13px;
    display:flex;align-items:center;gap:10px}
  .sec h2::before{content:"";width:18px;height:3px;border-radius:3px;background:var(--accent)}
  .badge{margin-left:auto;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:none;
    background:#e7f7ed;color:var(--green);border-radius:20px;padding:3px 11px;display:inline-flex;align-items:center;gap:6px}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.18)}

  /* Live embed */
  .embed{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    box-shadow:0 8px 26px -18px rgba(15,23,42,.4)}
  .embed .bar{display:flex;align-items:center;gap:9px;padding:11px 16px;border-bottom:1px solid var(--line);background:#fafcff}
  .embed .bar .ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:14px}
  .ic.xls{background:linear-gradient(135deg,#107c41,#16a34a)}
  .ic.ppt{background:linear-gradient(135deg,#c43e1c,#e8633a)}
  .embed .bar b{font-size:13px}
  .embed .bar .open{margin-left:auto;font-size:12px;color:var(--fib2);font-weight:600}
  .embed iframe{display:block;border:0;width:100%}
  .ppt-frame{height:0;padding-bottom:56.25%;position:relative}
  .ppt-frame iframe{position:absolute;inset:0;height:100%}
  .ph-embed{display:flex;gap:16px;align-items:center;padding:38px 28px;color:var(--muted)}
  .ph-embed .pic{width:48px;height:48px;border-radius:12px;display:grid;place-items:center;color:#fff;font-size:22px;flex:0 0 auto}
  .ph-embed b{color:var(--ink);font-size:15px}
  .ph-embed p{font-size:13px;margin-top:4px;max-width:640px}

  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .kpi .n{font-size:30px;font-weight:800;color:var(--fib)}
  .kpi .l{font-size:13px;color:var(--muted);margin-top:2px}
  .kpi .bar{height:6px;border-radius:6px;background:var(--line);margin-top:12px;overflow:hidden}
  .kpi .bar>span{display:block;height:100%;border-radius:6px}

  /* Phase track */
  .track{display:flex;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;overflow-x:auto}
  .ph{flex:1;min-width:128px;text-align:center;padding:12px 8px;border-radius:11px;background:#f7f9fd;border:1px solid var(--line)}
  .ph .d{font-size:11px;font-weight:700;color:#fff;background:var(--fib2);border-radius:20px;padding:2px 9px;display:inline-block}
  .ph .t{font-size:13px;font-weight:600;margin-top:8px}
  .ph .c{font-size:11px;color:var(--muted);margin-top:3px}

  /* Projects table */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{background:#f7f9fd;text-align:left;padding:13px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  td{padding:13px 16px;border-top:1px solid var(--line)}
  tr:hover td{background:#fafcff}
  .pill{font-size:12px;font-weight:600;padding:3px 11px;border-radius:20px;display:inline-block}
  .ontrack{background:#e7f7ed;color:var(--green)}
  .atrisk{background:#fef3e2;color:#b45309}
  .offtrack{background:#fdeaea;color:var(--red)}
  .mini{height:7px;border-radius:6px;background:var(--line);width:120px;overflow:hidden;display:inline-block;vertical-align:middle}
  .mini>span{display:block;height:100%}

  /* Templates */
  .tpls{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .tpl{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
  .tpl .ti{width:40px;height:40px;border-radius:10px;background:#eef3fc;color:var(--fib2);display:grid;place-items:center;font-size:18px}
  .tpl b{font-size:14px}.tpl small{color:var(--muted);font-size:12px}

  .note{font-size:12px;color:var(--muted);margin-top:9px;padding-left:2px}
  footer{margin-top:40px;text-align:center;color:var(--muted);font-size:12px}
  @media(max-width:760px){.kpis,.tpls{grid-template-columns:1fr}}

  #pw-overlay{position:fixed;inset:0;display:grid;place-items:center;padding:20px;
    background:radial-gradient(1100px 600px at 50% -10%,#13316b,#0a1f42 55%,#06152c);
    font-family:'Inter',system-ui,sans-serif;z-index:50}
  #pw-card{position:relative;background:rgba(255,255,255,.05);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.13);border-radius:22px;padding:40px 44px 34px;width:min(410px,92vw);
    text-align:center;box-shadow:0 30px 80px -30px rgba(0,0,0,.85)}
  #pw-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:#ffd479;background:rgba(245,166,35,.14);border:1px solid rgba(245,166,35,.35);border-radius:20px;padding:4px 12px;margin-bottom:18px}
  #pw-lock{width:66px;height:66px;margin:0 auto 16px;border-radius:50%;display:grid;place-items:center;font-size:28px;
    background:linear-gradient(135deg,#f5a623,#ffc658);box-shadow:0 10px 26px -8px rgba(245,166,35,.6)}
  #pw-card h2{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0 0 6px;color:#fff}
  #pw-card p{color:#bcd0ee;font-size:13px;line-height:1.5;margin:0 0 22px}
  #pw-inp{width:100%;border:1.5px solid rgba(255,255,255,.18);border-radius:11px;background:rgba(255,255,255,.07);
    color:#fff;font-size:15px;padding:12px 15px;font-family:inherit;text-align:center;letter-spacing:.1em;outline:none;transition:.18s}
  #pw-inp::placeholder{letter-spacing:normal;color:#7f96bd}
  #pw-inp:focus{border-color:#f5a623;background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(245,166,35,.18)}
  #pw-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,#f5a623,#ffc658);color:#06152c;font-weight:800;font-size:14px;
    border:none;border-radius:11px;padding:13px;cursor:pointer;transition:transform .15s,box-shadow .15s;font-family:inherit}
  #pw-btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px -10px rgba(245,166,35,.6)}
  #pw-err{color:#ffb4b4;font-size:13px;margin-top:14px;min-height:18px}
  #pw-foot{margin-top:18px;font-size:11px;color:#6f86ad}
  #app{display:none}
</style>
</head>
<body>
  <div id="pw-overlay">
    <div id="pw-card">
      <div id="pw-badge">Step 2 of 2 · Second security code</div>
      <div id="pw-lock">🔒</div>
      <h2>Second Security Code</h2>
      <p>You've passed the first check.<br>Enter the second security code to open the PMO dashboard.</p>
      <input id="pw-inp" type="password" placeholder="Second security code" autofocus
             onkeydown="if(event.key==='Enter')checkPw()">
      <button id="pw-btn" onclick="checkPw()">Unlock dashboard →</button>
      <div id="pw-err"></div>
      <div id="pw-foot">First Iraq Bank · PMO</div>
    </div>
  </div>

  <div id="app" class="wrap"></div>

  function b64(b){ const s=atob(b), u=new Uint8Array(s.length); for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i); return u; }

  async function deriveKey(pw, salt){
    const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:ENC.it, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  }

  async function checkPw(){
    const inp = document.getElementById('pw-inp');
    const err = document.getElementById('pw-err');
    const pw = inp.value; if(!pw) return;
    err.textContent = 'Unlocking…';
    try {
      const key = await deriveKey(pw, b64(ENC.s));
      const pt  = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(ENC.i) }, key, b64(ENC.c));
      document.getElementById('app').innerHTML = new TextDecoder().decode(pt);
      document.getElementById('pw-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      sessionStorage.setItem('pmo_pw', pw);
    } catch(e){
      err.textContent = 'Incorrect password — try again.';
      inp.value = ''; inp.focus();
      setTimeout(()=>err.textContent='', 3000);
    }
  }

  // Auto-unlock within the same browser session after one successful entry.
  (function(){ const c = sessionStorage.getItem('pmo_pw');
    if(c){ const i=document.getElementById('pw-inp'); i.value=c; checkPw(); } })();
</script>
