<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIB · PMO Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root{--fib:#0a3b7c;--fib2:#1366cc;--accent:#f5a623;--green:#16a34a;--amber:#f59e0b;--red:#dc2626;
    --bg:#eef1f8;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e6eaf2;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{font-family:'Inter',system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .wrap{max-width:1240px;margin:0 auto;padding:26px 20px 60px}
  header{background:linear-gradient(120deg,var(--fib),var(--fib2));color:#fff;border-radius:18px;padding:26px 30px;position:relative;overflow:hidden;box-shadow:0 14px 34px -16px rgba(10,59,124,.6)}
  header::after{content:"";position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07)}
  .brandrow{display:flex;align-items:center;gap:13px}
  .logo{width:46px;height:46px;border-radius:12px;background:#fff;color:var(--fib);display:grid;place-items:center;font-weight:800;font-size:18px}
  header h1{font-size:22px;font-weight:700}header p{opacity:.9;font-size:13px;margin-top:2px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-top:20px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;position:relative}
  .kpi .n{font-size:25px;font-weight:800;color:var(--fib);white-space:nowrap}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
  .sec{margin-top:22px}
  .sec>h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .sec>h2::before{content:"";width:18px;height:3px;border-radius:3px;background:var(--accent)}
  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{font-family:inherit;font-size:13px;font-weight:600;color:var(--fib2);background:#fff;border:1.5px solid var(--line);
    border-radius:20px;padding:7px 15px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .chip b{background:#eef3fc;border-radius:12px;padding:0 8px;font-size:11.5px}
  .chip:hover{border-color:#b9cdf3}
  .chip.off{opacity:.38;text-decoration:line-through;background:#f1f3f9}
  .chip.all{color:#fff;background:linear-gradient(135deg,var(--fib2),var(--fib));border-color:transparent}
  /* manager cards */
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.15s}
  .mcard:hover{box-shadow:0 12px 28px -18px rgba(15,23,42,.35)}
  .mhead{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line);background:#fafcff}
  .mavatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--fib2),var(--fib));color:#fff;display:grid;place-items:center;font-weight:800;font-size:16px;flex:0 0 auto}
  .mname{font-weight:700;font-size:14.5px}.msub{font-size:12px;color:var(--muted)}
  .mavg{margin-left:auto;font-size:21px;font-weight:800;text-align:right}
  .mavg small{display:block;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.4px}
  .mbody{padding:12px 18px 15px}
  .prow{display:flex;align-items:center;gap:9px;margin:7px 0;font-size:12.5px}
  .pnm{width:46%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pbar{flex:1;height:8px;background:#eef1f8;border-radius:6px;overflow:hidden}
  .pbar>span{display:block;height:100%;border-radius:6px}
  .ppc{width:36px;text-align:right;font-weight:700;color:var(--muted);font-size:12px}
  /* financial table */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:visible}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{background:#f7f9fd;text-align:left;padding:11px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  td{padding:11px 16px;border-top:1px solid var(--line);vertical-align:middle}
  tr:hover td{background:#fafcff}.pn{font-weight:600}
  .mv{font-weight:700}
  .pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
  .totrow td{background:#f4f7fd;border-top:2px solid #d6deee;font-weight:800}
  /* scroll nav + mouse hint */
  .scrollnav{position:fixed;right:16px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:40}
  .scrollnav button{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--fib2);
    font-size:17px;cursor:pointer;box-shadow:0 8px 20px -8px rgba(15,23,42,.35);transition:.15s}
  .scrollnav button:hover{transform:translateY(-2px);background:#eef3fc}
  .scrollhint{display:flex;flex-direction:column;align-items:center;gap:5px;margin:16px auto 0;cursor:pointer;
    color:var(--muted);font-size:10px;letter-spacing:.18em;text-transform:uppercase;width:max-content}
  .mouse{width:22px;height:36px;border:2px solid #9fb0c8;border-radius:12px;position:relative}
  .wheel{width:4px;height:7px;border-radius:3px;background:var(--fib2);position:absolute;left:50%;margin-left:-2px;top:6px;animation:wheel 1.6s ease infinite}
  @keyframes wheel{0%{top:6px;opacity:1}70%{top:19px;opacity:0}100%{top:6px;opacity:0}}
  .expbtn{position:absolute;right:26px;bottom:18px;font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.35);border-radius:9px;padding:7px 14px;cursor:pointer;transition:.15s}
  .expbtn:hover{background:rgba(255,255,255,.28)}
  .mv.paid{color:var(--green);font-size:14.5px}
  .mv.rem{color:var(--red);font-size:14.5px}
  .mv.zero{color:var(--green);font-size:14.5px}
  td:has(.mv.paid){background:#f3fbf6}
  td:has(.mv.rem){background:#fdf6f6}
  td:has(.mv.zero){background:#f3fbf6}
  .cur{font-size:10px;font-weight:800;letter-spacing:.4px;border-radius:5px;padding:2px 6px;margin-left:5px;vertical-align:1px}
  .cur.usd{background:#e7f7ed;color:var(--green)}
  .cur.iqd{background:#fdf1dc;color:#b45309}
  .cur.tbd{background:#f1f3f9;color:var(--muted)}
  .cur.inh{background:#e8f1ff;color:var(--fib2)}
  .mnone{color:#c2cad9}
  .money{position:relative;cursor:help}
  .money:hover::after{content:attr(data-tip);position:absolute;left:0;bottom:130%;z-index:30;white-space:nowrap;
    background:#0f172a;color:#fff;font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;box-shadow:0 10px 26px -8px rgba(0,0,0,.5)}
  .kpi .money:hover::after{white-space:normal;width:300px}
  /* embeds */
  .embedcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
  .ehead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .ehead h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .eic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;font-size:16px;flex:0 0 auto}
  .eic.xls{background:linear-gradient(135deg,#107c41,#16a34a)}
  .eic.ppt{background:linear-gradient(135deg,#c43e1c,#e8633a)}
  .livestamp{position:absolute;right:26px;top:24px;font-size:11px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);padding:4px 11px;border-radius:20px;color:#d9fbe7}
  .fsbtn{margin-left:auto;font-size:12px;font-weight:600;color:var(--fib2);background:#eef3fc;border:1px solid var(--line);border-radius:8px;padding:6px 12px;cursor:pointer}
  .fsbtn:hover{background:#e0eaff}
  .frm{width:100%;border:0;border-radius:10px;display:block;background:#f7f9fd}
  .frm:fullscreen{height:100vh!important}
  /* launcher tiles + fullscreen overlays */
  .launchers{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:700px){.launchers{grid-template-columns:1fr}}
  .launch{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:24px 22px;cursor:pointer;transition:.15s;text-align:left;font-family:inherit}
  .launch:hover{transform:translateY(-3px);box-shadow:0 16px 32px -18px rgba(15,23,42,.4);border-color:#c4d3ef}
  .launch .eic{width:48px;height:48px;font-size:23px;border-radius:13px}
  .launch b{font-size:15.5px;display:block}
  .launch small{color:var(--muted);font-size:12.5px}
  .launch .go{margin-left:auto;font-size:13px;font-weight:700;color:var(--fib2);white-space:nowrap}
  .fsov{position:fixed;inset:0;background:#fff;z-index:60;display:none;flex-direction:column}
  .fsov.open{display:flex}
  .fsbar{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--line);background:#f7f9fd}
  .fsbar b{font-size:14px}
  .fsexit{margin-left:auto;font-size:17px;font-weight:800;color:#fff;background:var(--red);border:none;border-radius:13px;
    padding:15px 32px;cursor:pointer;transition:.15s;font-family:inherit;letter-spacing:.02em;
    animation:exitpulse 1.6s ease infinite}
  .fsexit:hover{transform:scale(1.07);background:#b91c1c;animation:none}
  @keyframes exitpulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.45)}70%{box-shadow:0 0 0 16px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
  .fsifr{flex:1;border:0;width:100%}
  .hide{display:none!important}
  footer{margin-top:30px;text-align:center;color:var(--muted);font-size:12px}

  #pw-overlay{position:fixed;inset:0;display:grid;place-items:center;padding:20px;
    background:radial-gradient(1100px 600px at 50% -10%,#13316b,#0a1f42 55%,#06152c);
    font-family:'Inter',system-ui,sans-serif;z-index:50}
  #pw-card{position:relative;background:rgba(255,255,255,.05);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.13);border-radius:22px;padding:40px 44px 34px;width:min(410px,92vw);
    text-align:center;box-shadow:0 30px 80px -30px rgba(0,0,0,.85)}
  #pw-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:#ffd479;background:rgba(245,166,35,.14);border:1px solid rgba(245,166,35,.35);border-radius:20px;padding:4px 12px;margin-bottom:18px}
  #pw-lock{width:66px;height:66px;margin:0 auto 16px;border-radius:50%;display:grid;place-items:center;font-size:28px;
    background:linear-gradient(135deg,#f5a623,#ffc658);box-shadow:0 10px 26px -8px rgba(245,166,35,.6)}
  #pw-card h2{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0 0 6px;color:#fff}
  #pw-card p{color:#bcd0ee;font-size:13px;line-height:1.5;margin:0 0 22px}
  #pw-inp{width:100%;border:1.5px solid rgba(255,255,255,.18);border-radius:11px;background:rgba(255,255,255,.07);
    color:#fff;font-size:15px;padding:12px 15px;font-family:inherit;text-align:center;letter-spacing:.1em;outline:none;transition:.18s}
  #pw-inp::placeholder{letter-spacing:normal;color:#7f96bd}
  #pw-inp:focus{border-color:#f5a623;background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(245,166,35,.18)}
  #pw-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,#f5a623,#ffc658);color:#06152c;font-weight:800;font-size:14px;
    border:none;border-radius:11px;padding:13px;cursor:pointer;transition:transform .15s,box-shadow .15s;font-family:inherit}
  #pw-btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px -10px rgba(245,166,35,.6)}
  #pw-err{color:#ffb4b4;font-size:13px;margin-top:14px;min-height:18px}
  #pw-foot{margin-top:18px;font-size:11px;color:#6f86ad}
  #app{display:none}
</style>
</head>
<body>
  <div id="pw-overlay">
    <div id="pw-card">
      <div id="pw-badge">Step 2 of 2 · Second security code</div>
      <div id="pw-lock">🔒</div>
      <h2>Second Security Code</h2>
      <p>You've passed the first check.<br>Enter the second security code to open the PMO dashboard.</p>
      <input id="pw-inp" type="password" placeholder="Second security code" autofocus
             onkeydown="if(event.key==='Enter')checkPw()">
      <button id="pw-btn" onclick="checkPw()">Unlock dashboard →</button>
      <div id="pw-err"></div>
      <div id="pw-foot">First Iraq Bank · PMO</div>
    </div>
  </div>

  <div id="app" class="wrap"></div>

  function b64(b){ const s=atob(b), u=new Uint8Array(s.length); for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i); return u; }

  async function deriveKey(pw, salt){
    const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:ENC.it, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  }

  async function checkPw(){
    const inp = document.getElementById('pw-inp');
    const err = document.getElementById('pw-err');
    const pw = inp.value; if(!pw) return;
    err.textContent = 'Unlocking…';
    try {
      const key = await deriveKey(pw, b64(ENC.s));
      const pt  = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(ENC.i) }, key, b64(ENC.c));
      document.getElementById('app').innerHTML = new TextDecoder().decode(pt);
      document.getElementById('pw-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      var rt = document.getElementById('rt-js');
      if (rt) { try { (new Function(rt.textContent))(); } catch(e) { console.error('rt', e); } }
    } catch(e){
      err.textContent = 'Incorrect code — try again.';
      inp.value = ''; inp.focus();
      setTimeout(()=>err.textContent='', 3000);
    }
  }
